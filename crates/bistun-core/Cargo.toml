# =====================================================================
# BISTUN LMS: STANDARD CRATE TEMPLATE
# Ref: [LMS-STACK], [LMS-DOC], [007-LMS-OPS]
# =====================================================================

[package]
name = "bistun-core"
version = "2.0.2"
description = "The authoritative Linguistic DNA models and DTOs for the Bistun LMS. Provides a high-performance, immutable contract layer for BCP 47 locale resolution, typographic traits, and linguistic metadata."
repository = "https://github.com/fwazeter/bistun/tree/main/crates/bistun-core"
keywords = ["i18n", "bcp47", "linguistics", "metadata", "dto"]
categories = ["internationalization", "data-structures"]
readme = "README.md"
documentation = "https://docs.rs/bistun-core"

# Inherit global workspace standards to prevent metadata drift
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true

# ---------------------------------------------------------------------
# DOCS.RS METADATA
# Ensures that auto-generated documentation includes all feature-gated
# code, preventing "missing documentation" confusion for external users.
# ---------------------------------------------------------------------
[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

# ---------------------------------------------------------------------
# FEATURE GATES
# Enforces the "Zero-Overhead" principle. Only compile what is needed.
# ---------------------------------------------------------------------
[features]
# Baseline execution limits
default = []

# Persistence: Includes registry models and WORM persistence structures.
persistence = []

# Operations: Includes SDK health and synchronization metrics.
ops = []

# Testing: Authoritative simulation data (Golden Set).
testing = []

# Full: Convenience feature for local development.
full = ["persistence", "ops", "testing"]

# ---------------------------------------------------------------------
# DEPENDENCIES
# Use `workspace = true` whenever possible to ensure version lockstep.
# ---------------------------------------------------------------------
[dependencies]
# Core serialization for DTOs per 011-LMS-DTO
serde = { workspace = true }
# Performance: High-speed collections for Flyweight pools
hashbrown = { workspace = true }
# Standardized error handling per LMS-PROCESS-ERROR
thiserror = { workspace = true }

# ---------------------------------------------------------------------
# DEV-DEPENDENCIES
# Strict isolation tools for hermetic testing (LMS-TEST).
# ---------------------------------------------------------------------
[dev-dependencies]
# Required for hermetic serialization tests
serde_json = { workspace = true }

# ---------------------------------------------------------------------
# LINTING STANDARDS (Inherited)
# ---------------------------------------------------------------------
[lints]
workspace = true

# ---------------------------------------------------------------------
# EXAMPLES
# ---------------------------------------------------------------------
[[example]]
name = "build_manifest"
path = "examples/build_manifest.rs"
# Ensure the core ops and serialization features are enabled to demonstrate the DTO
required-features = ["ops", "persistence"]