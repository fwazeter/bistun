# =====================================================================
# BISTUN LMS: STANDARD CRATE TEMPLATE
# Ref: [LMS-STACK], [LMS-DOC], [007-LMS-OPS]
# =====================================================================

[package]
name = "bistun-lms"
version = "2.1.1"
description = "A thread-safe capability engine for resolving BCP 47 language tags into actionable rendering and parsing properties (directionality, morphology, segmentation). Features a wait-free, lock-free memory pool (ArcSwap) enabling zero-downtime registry hot-swaps for high-throughput NLP and UI pipelines."
repository = "https://github.com/fwazeter/bistun/tree/main/crates/bistun-lms"
keywords = ["i18n", "bcp47", "localization", "linguistics", "capability-engine"]
categories = ["internationalization", "text-processing"]
readme = "README.md"
documentation = "https://docs.rs/bistun-lms"

# Inherit global workspace standards to prevent metadata drift
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true

# ---------------------------------------------------------------------
# DOCS.RS METADATA
# Ensures that auto-generated documentation includes all feature-gated
# code, preventing "missing documentation" confusion for external users.
# ---------------------------------------------------------------------
[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

# ---------------------------------------------------------------------
# FEATURE GATES
# Enforces the "Zero-Overhead" principle. Only compile what is needed.
# ---------------------------------------------------------------------
[features]
# Standard servers get full async and file/network I/O out of the box.
# WASM/Edge consumers can opt out via `default-features = false`.
default = ["fs", "network", "async-worker"]

# Enables FileSnapshotProvider
fs = ["tokio/fs"]

# Enables HttpSnapshotProvider
network = ["dep:reqwest"]

# Enables the background polling worker (forces Tokio runtime)
async-worker = ["tokio/rt-multi-thread", "tokio/time"]

# Enables the hermetic simulation data and dynamic Ed25519 key generation
simulation = ["dep:rand", "ed25519-dalek/rand_core", "bistun-core/testing"]

# ---------------------------------------------------------------------
# DEPENDENCIES
# Use `workspace = true` whenever possible to ensure version lockstep.
# ---------------------------------------------------------------------
[dependencies]
bistun-core = { workspace = true, features = ["persistence", "ops"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tracing = { workspace = true }      # Mandatory for SLI observability
arc-swap = "1.9.1"                  # Wait-free, lock-free memory pool

# Concurrency & Async
tokio = { workspace = true, optional = true }

# Optional Network I/O
reqwest = { workspace = true, optional = true }

# Cryptographic verification
ed25519-dalek = { workspace = true }
base64 = { workspace = true }

# WASM Compatibility
# web-time acts as a drop-in replacement for std::time that won't panic in browsers
web-time = "1.1.0"

# Simulation / Golden Data
rand = { workspace = true, optional = true }


# ---------------------------------------------------------------------
# DEV-DEPENDENCIES
# Strict isolation tools for hermetic testing (LMS-TEST).
# ---------------------------------------------------------------------
[dev-dependencies]
mockall = { workspace = true }
tokio = { workspace = true, features = ["full"] }
criterion = { workspace = true, features = ["html_reports"] }
tempfile = { workspace = true }
hashbrown = { workspace = true }

# ---------------------------------------------------------------------
# COMPILER PROFILES (LMS-OPS ENFORCEMENT)
# ---------------------------------------------------------------------

[profile.release]
# Maximize performance for the < 1ms resolution budget
opt-level = 3
lto = "fat"             # Cross-crate Link Time Optimization
codegen-units = 1       # Slower compile times, but maximum binary optimization
panic = "abort"         # Reduces binary size and overhead (Fail-Fast philosophy)
strip = true            # Strip symbols for minimal binary weight

[profile.dev]
# Optimize for rapid local compilation and debugging
opt-level = 0
debug = true
debug-assertions = true

# ---------------------------------------------------------------------
# LINTING STANDARDS (Rust 1.74+)
# Strictly enforce LMS-DOC and performance idioms at the compiler level.
# ---------------------------------------------------------------------
[lints.rust]
missing_docs = "deny"        # Enforces LMS-DOC Narrative Requirements
unsafe_code = "forbid"       # Memory safety is absolute

[lints.clippy]
all = "deny"
pedantic = "warn"            # Catch high-performance regressions
unwrap_used = "warn"         # Enforce proper LmsError bubbling

# ---------------------------------------------------------------------
# EXAMPLES & BENCHMARKS
# ---------------------------------------------------------------------

[[bench]]
name = "performance_verification"
harness = false
required-features = ["simulation"]

[[example]]
name = "hot_swap_demo"
path = "examples/hot_swap_demo.rs"
# Requires the Tokio worker threads for background polling and simulation for fake keys
required-features = ["async-worker", "simulation"]

[[example]]
name = "standalone_resolver"
path = "examples/standalone_resolver.rs"
# Only requires simulation data to boot; no background threads needed
required-features = ["simulation"]