# Bistun LMS Linting Standard
# Ref: [LMS-OPS]

# Disallow heavy allocations in the critical resolution path
too-many-arguments-threshold = 5
type-complexity-threshold = 250

# Ensure documentation checks for crate items
missing-docs-in-crate-items = true

# Performance-related lints for <1ms targets  (not confirmed feature)
# warn-on-all-auto-impl = true