name: LMS-CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  quality-gate:
    name: Verify Standards (LMS-DOC & LMS-TEST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      # --- ADD THIS STEP BELOW ---
      - name: Enable Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          shared-key: "lms-shared-cache"
      # ---------------------------

      - name: 1. Check Formatting
        run: cargo fmt --all -- --check

      - name: 2. Enforce LMS-TEST (Unit, Integration, & Doc Tests)
        run: cargo test --workspace --all-targets --all-features

      - name: 3. Enforce Best Practices (Clippy)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: 4. Enforce LMS-DOC (Narrative Documentation)
        run: cargo doc --no-deps --workspace --all-features --document-private-items
        env:
          RUSTDOCFLAGS: "-D warnings"

  performance-gate:
    name: Verify Performance Budget (<1ms)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Enable Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          shared-key: "lms-shared-cache"

      - name: Run Benchmarks
        run: cargo bench