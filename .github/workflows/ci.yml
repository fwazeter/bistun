name: LMS-CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  quality-gate:
    name: Verify Standards (LMS-DOC & LMS-TEST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: 1. Check Formatting
        run: cargo fmt --all -- --check

      - name: 2. Enforce LMS-TEST (Unit, Integration, & Doc Tests)
        # This step verifies path exhaustion and executable documentation
        run: cargo test --workspace --all-targets --all-features

      - name: 3. Enforce Best Practices (Clippy)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: 4. Enforce LMS-DOC (Narrative Documentation)
        # Denies warnings in rustdoc to ensure intra-doc links are valid
        # and that the narrative code standard is upheld.
        run: cargo doc --no-deps --workspace --all-features --document-private-items
        env:
          RUSTDOCFLAGS: "-D warnings"

  performance-gate:
    name: Verify Performance Budget (<1ms)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run Benchmarks
        # Note: This requires the 'benches' to be set up in Step 4
        run: cargo bench