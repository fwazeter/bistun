[package]
name = "bistun"
version = "0.2.0"
authors = ["Francis Xavier Wazeter IV"]
edition = "2024"

[dependencies]
# Core dependencies will be added in Chunk 1
# Error Handling: Standardized per LMS-PROCESS-ERROR
thiserror = "2.0.18"

# Observability: Standardized per LMS-PROCESS-ERROR
tracing = { version = "0.1.44", features = ["attributes"]}

# Serialization: Required for CapabilityManifest DTOs
serde = { version="1.0.228", features = ["derive"]}
serde_json = "1.0.149"

# Performance: High-speed collections for Flyweight pools
hashbrown = { version="0.17.0", features = ["serde"]}

[dev-dependencies]
# Required for hermetic mocking in isolation.
mockall = "0.14.0"
# Required for statistically significant performance verification
criterion = { version = "0.8.2", features = ["html_reports"] }

[[bench]]
name = "performance_verification"
harness = false # Required to use Criterion's custom harness